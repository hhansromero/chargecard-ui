<div class="card bg-light w-75 mx-auto">
  <div class="card-header">ADMINISTRAR PERFIL</div>
  <div class="card-body">
    <div class="card border-dark mb-3">
      <mat-form-field appearance="fill">
        <mat-label>Username</mat-label>
        <input matInput [(ngModel)]="user.username">
      </mat-form-field>
      <mat-form-field appearance="fill">
        <mat-label>Contraseña</mat-label>
        <input type="password" matInput [(ngModel)]="user.password">
      </mat-form-field>
      <mat-form-field appearance="fill">
        <mat-label>Nombre Completo</mat-label>
        <input matInput [(ngModel)]="user.passenger.name">
      </mat-form-field>
      <mat-form-field appearance="fill">
        <mat-label>Nro de DNI</mat-label>
        <input matInput [(ngModel)]="user.passenger.dni" readonly>
      </mat-form-field>
      <mat-form-field appearance="fill">
        <mat-label>Email</mat-label>
        <input matInput [(ngModel)]="user.passenger.email">
      </mat-form-field>
      <mat-form-field appearance="fill">
        <mat-label>Teléfono</mat-label>
        <input matInput [(ngModel)]="user.passenger.phone">
      </mat-form-field>
      <mat-form-field appearance="fill">
        <mat-label>Nro de Lima Pass</mat-label>
        <input matInput [(ngModel)]="user.metroCard.number" readonly>
      </mat-form-field>
      <mat-form-field appearance="fill">
        <mat-label>Saldo Actual</mat-label>
        <input matInput [(ngModel)]="user.metroCard.currentBalance" readonly>
      </mat-form-field>
      <section>
        <div class="example-button-row">
          <button mat-raised-button (click)="save()">Guardar</button>
          <button mat-raised-button routerLink="/home">Cancelar</button>
        </div>
      </section>

    </div>
  </div>
</div>
